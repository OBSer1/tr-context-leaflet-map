<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Southwest Alberta Map</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <style>
    html, body, #map {
      width: 100%;
      margin: 0;
      padding: 0;
    }
    .leaflet-control-attribution {
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map("map", {
      zoomControl: true,
      scrollWheelZoom: true
    })

    // Image dimensions (pixels)
var width = 9216;
var height = 6144;

// Convert to Leaflet coordinates
var bounds = [[0,0], [height, width]];


    L.tileLayer("https://api.maptiler.com/images/019ce303-6cdb-71ce-8d07-c536682a6388/{z}/{x}/{y}?key=HeGrCVsbkGCIdm3hjmI5", {
      minZoom: 0,
      maxZoom: 5,
      noWrap: true,
      attribution: "&copy; Timber Ridge Properties"
    }).addTo(map);


    map.setMaxBounds(bounds);
    map.fitBounds(bounds);

    L.control.scale().addTo(map);
  </script>
</body>
</html>
