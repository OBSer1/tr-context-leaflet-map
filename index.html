<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Timber Ridge Context Map</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>

/* Base layout */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
}

#map {
  width: 100%;
  height: 100vh;
  background: #000;
}

.leaflet-container {
  background: #000;
  font-family: Arial, sans-serif;
}

/* Z-index fixes */
.leaflet-top,
.leaflet-bottom,
.leaflet-control {
  z-index: 700 !important;
}

.leaflet-popup-pane,
.leaflet-popup {
  z-index: 1400 !important;
}

/* Popup styling */
.leaflet-popup-content-wrapper {
  overflow: visible;
  border-radius: 12px;
}

.leaflet-popup-content {
  margin: 10px;
}

/* Controls layout */
.leaflet-bottom.leaflet-right {
  display: flex;
  gap: 8px;
}

.leaflet-control-attribution {
  display: none !important;
}

/* =========================
   FILTER PANEL (UPDATED)
   ========================= */

.map-ui {
  background: rgba(255,255,255,0.72);
  border-radius: 12px;
  box-shadow:
    0 10px 28px rgba(0,0,0,0.22),
    0 3px 10px rgba(0,0,0,0.10);
  padding: 12px;
  min-width: 220px;
  max-width: 260px;
  backdrop-filter: blur(6px);
  transform-origin: top right;
  overflow: hidden;

  transition:
    transform 1000ms ease,
    opacity 1000ms ease,
    padding 1000ms ease,
    min-width 1000ms ease,
    max-width 1000ms ease;
}

/* Body animates vertically */
.map-ui-body {
  max-height: 500px;
  opacity: 1;
  transform: scaleY(1);
  transform-origin: top;
  overflow: hidden;

  transition:
    max-height 1000ms ease,
    opacity 1000ms ease,
    transform 1000ms ease;
}

/* Collapsed state */
.map-ui.collapsed {
  min-width: 58px;
  max-width: 58px;
}

.map-ui.collapsed .map-ui-body {
  max-height: 0;
  opacity: 0;
  transform: scaleY(0);
  pointer-events: none;
}

/* Header */
.map-ui-header {
  display: flex;
  justify-content: center;
  cursor: pointer;
}

/* Pulsing button */
.pulse {
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.15); opacity: 0.6; }
  100% { transform: scale(1); opacity: 1; }
}

</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* =========================
   MAP INIT
   ========================= */

const map = L.map('map').setView([50.8, -114.7], 7);

L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

/* =========================
   FILTER PANEL CONTROL
   ========================= */

const FilterControl = L.Control.extend({
  onAdd: function () {

    const container = L.DomUtil.create('div', 'map-ui');

    container.innerHTML = `
      <div class="map-ui-header">
        🔍
      </div>
      <div class="map-ui-body">
        <div>Filter content here</div>
      </div>
    `;

    L.DomEvent.disableClickPropagation(container);

    return container;
  }
});

const filterControl = new FilterControl({ position: 'topright' });
filterControl.addTo(map);

/* =========================
   PANEL LOGIC
   ========================= */

let panel = document.querySelector('.map-ui');
let firstAutoHideHandled = false;
let timer = null;

/* Collapse */
function collapsePanel() {
  panel.classList.add('collapsed');
  panel.querySelector('.map-ui-header').classList.add('pulse');
}

/* Expand */
function expandPanel() {
  panel.classList.remove('collapsed');
  panel.querySelector('.map-ui-header').classList.remove('pulse');
}

/* Auto-hide after 1 second */
function scheduleAutoHide() {
  if (firstAutoHideHandled) return;

  clearTimeout(timer);
  timer = setTimeout(() => {
    firstAutoHideHandled = true;
    collapsePanel();
  }, 1000); // ← KEY CHANGE
}

/* Toggle on click */
panel.querySelector('.map-ui-header').addEventListener('click', () => {
  if (panel.classList.contains('collapsed')) {
    expandPanel();
  } else {
    collapsePanel();
  }
});

/* Collapse on map interaction */
map.on('zoomstart dragstart', collapsePanel);

/* Start timer on load */
scheduleAutoHide();

</script>

</body>
</html>
