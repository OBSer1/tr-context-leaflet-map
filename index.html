<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>Southwest Alberta Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    #map {
      width: 100%;
      height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    .leaflet-control-attribution {
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Image dimensions in pixels
    const width = 9216;
    const height = 6144;

    // Bounds for a simple image coordinate system
    const bounds = [
      [0, 0],
      [height, width]
    ];

    const map = L.map("map", {
      crs: L.CRS.Simple,
      zoomControl: true,
      scrollWheelZoom: true,
      minZoom: 0,
      maxZoom: 5,
      maxBounds: bounds,
      maxBoundsViscosity: 1.0
    });

    L.tileLayer(
      "https://api.maptiler.com/images/019ce303-6cdb-71ce-8d07-c536682a6388/{z}/{x}/{y}?key=HeGrCVsbkGCIdm3hjmI5",
      {
        minZoom: 0,
        maxZoom: 5,
        noWrap: true,
        bounds: bounds,
        attribution: "&copy; Timber Ridge Properties"
      }
    ).addTo(map);

    // Start with the full image visible
    map.fitBounds(bounds);

    L.control.scale().addTo(map);
  </script>
</body>
</html>
