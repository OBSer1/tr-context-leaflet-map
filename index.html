<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Leaflet JPG Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .leaflet-container {
      background: #fff;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Replace these with your image dimensions in pixels
    const imageWidth = 9216;
    const imageHeight = 6144;

    // Replace this with your actual MapTiler tile URL
    const tileUrl = "https://api.maptiler.com/images/019ce303-6cdb-71ce-8d07-c536682a6388/{z}/{x}/{y}?key=HeGrCVsbkGCIdm3hjmI5";

    // Image bounds for CRS.Simple
    const bounds = [
      [0, 0],
      [imageHeight, imageWidth]
    ];

    const map = L.map("map", {
      crs: L.CRS.Simple,
      zoomSnap: 0.25,
      zoomDelta: 0.25,
      wheelPxPerZoomLevel: 120,
      maxBounds: bounds,
      maxBoundsViscosity: 1.0
    });

    L.tileLayer(tileUrl, {
      tileSize: 256,
      zoomOffset: 0,
      minZoom: 0,
      maxZoom: 5,
      noWrap: true,
    }).addTo(map);

    // Start fully zoomed out to show the whole image
    map.fitBounds(bounds, {
      animate: false,
      padding: [0, 0]
    });

    // Prevent zooming out farther than the full-image view
    map.setMinZoom(map.getZoom());

    // Keep panning locked to image area
    map.setMaxBounds(bounds);
  </script>
</body>
</html>
