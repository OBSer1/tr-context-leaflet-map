<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Southwest Alberta Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    #map {
      width: 100%;
      height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #f5f5f5;
    }

    .leaflet-control-attribution {
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const width = 9216;
    const height = 6144;
    const bounds = [[0, 0], [height, width]];

    const map = L.map("map", {
      crs: L.CRS.Simple,
      minZoom: 0,
      maxZoom: 5,
      zoomControl: true,
      scrollWheelZoom: true,
      maxBounds: bounds,
      maxBoundsViscosity: 1.0
    });

    const tiles = L.tileLayer(
      "https://api.maptiler.com/images/019ce303-6cdb-71ce-8d07-c536682a6388/{z}/{x}/{y}.jpg?key=HeGrCVsbkGCIdm3hjmI5",
      {
        tileSize: 512,
        zoomOffset: -1,
        minZoom: 0,
        maxZoom: 5,
        noWrap: true,
        bounds: bounds,
        attribution: "&copy; Timber Ridge Properties"
      }
    );

    tiles.on("tileerror", function (e) {
      console.error("Tile failed to load:", e.tile.src);
    });

    tiles.addTo(map);
    map.fitBounds(bounds);
  </script>
</body>
</html>
