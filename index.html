<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timber Ridge Context Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100vh;
      background: #132b06;
    }

    .leaflet-container {
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Image / tileset settings
    const imageWidth = 9216;
    const imageHeight = 6144;
    const minZoom = 2;
    const maxZoom = 5;
    const tileSize = 512;

    // Create map in simple pixel-based coordinates
    const map = L.map("map", {
      crs: L.CRS.Simple,
      minZoom: minZoom,
      maxZoom: maxZoom,
      zoomSnap: 1,
      zoomDelta: 1,
      wheelPxPerZoomLevel: 120,
      maxBoundsViscosity: 1.0
    });

    // Convert image pixel dimensions into Leaflet coordinates
    // Use maxZoom because the image dimensions are full-resolution pixels
    const southWest = map.unproject([0, imageHeight], maxZoom);
    const northEast = map.unproject([imageWidth, 0], maxZoom);
    const bounds = L.latLngBounds(southWest, northEast);

    // Tile layer
    L.tileLayer(
      "https://api.maptiler.com/images/019ce303-6cdb-71ce-8d07-c536682a6388/{z}/{x}/{y}?key=HeGrCVsbkGCIdm3hjmI5",
      {
        tileSize: tileSize,
        minZoom: minZoom,
        maxZoom: maxZoom,
        noWrap: true,
        bounds: bounds,
        attribution: ""
      }
    ).addTo(map);

    // Keep the user inside the image only
    map.setMaxBounds(bounds);

    // Open with the full image showing
    map.fitBounds(bounds);

    // Optional: prevent dragging outside even during momentum/inertia
    map.panInsideBounds(bounds, { animate: false });
  </script>
</body>
</html>
